name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
          cache-read-only: false

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$SIGNING_KEY" ]; then
            echo "$SIGNING_KEY" | base64 -d > keystore.jks
            for apk in app/build/outputs/apk/release/*-unsigned.apk app/build/outputs/apk/release/*.apk; do
              [ -f "$apk" ] || continue
              if echo "$apk" | grep -qv 'signed'; then
                jarsigner -verbose -keystore keystore.jks -storepass "$KEYSTORE_PASSWORD" \
                  -keypass "$KEY_PASSWORD" "$apk" "$KEY_ALIAS"
              fi
            done
            rm -f keystore.jks
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: crunch-barcode-apk
          path: app/build/outputs/apk/release/*.apk

  release:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: crunch-barcode-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Crunch Barcode App

            Automated build from commit ${{ github.sha }}.

            ### How to install
            1. Download the APK file below
            2. Enable "Install from unknown sources" in Android settings
            3. Open the APK and install
          files: |
            *.apk
          draft: false
          prerelease: false
