name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
          cache-read-only: false

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Create release keystore
        run: |
          if [ -n "${{ secrets.ANDROID_SIGNING_KEY }}" ]; then
            echo "${{ secrets.ANDROID_SIGNING_KEY }}" | base64 -d > app/release.keystore
          else
            echo "No signing key secret. Generating ephemeral debug keystore..."
            keytool -genkey -v -keystore app/release.keystore \
              -alias release \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=CrunchBarcode, OU=Dev, O=CrunchBarcode, L=City, S=State, C=US"
          fi

      - name: Build signed APK
        env:
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: release
          KEY_PASSWORD: android
        run: ./gradlew assembleRelease

      - name: Rename and verify APK
        run: |
          ls -la app/build/outputs/apk/release/
          # Rename for cleaner release
          cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/CrunchBarcode-v1.0.0.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: crunch-barcode-apk
          path: app/build/outputs/apk/release/CrunchBarcode-v*.apk
          compression-level: 0

  release:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: crunch-barcode-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Crunch Barcode v${{ github.run_number }}

            - APK is signed with V1, V2, and V3 signature schemes
            - Zipaligned for proper installation
            - Targets Android 10+ (API 26), built against API 35

            ### Install
            1. Download **CrunchBarcode-v1.0.0.apk**
            2. Open it on your Android device
            3. Tap **More Details** → **Install Anyway** if prompted to scan
            4. Confirm with your biometrics or device PIN
          files: |
            CrunchBarcode-*.apk
          draft: false
          prerelease: false
