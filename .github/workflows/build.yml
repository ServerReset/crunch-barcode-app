name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"
          cache-read-only: false

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign APK (production key or debug fallback)
        env:
          SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ ! -f "$UNSIGNED_APK" ]; then
            echo "No unsigned APK found"
            exit 1
          fi

          SIGNED_APK="app/build/outputs/apk/release/app-release.apk"

          if [ -n "$SIGNING_KEY" ]; then
            echo "$SIGNING_KEY" | base64 -d > keystore.jks
            jarsigner -verbose -keystore keystore.jks \
              -storepass "$KEYSTORE_PASSWORD" -keypass "$KEY_PASSWORD" \
              -digestalg SHA-256 -sigalg SHA256withRSA \
              "$UNSIGNED_APK" "$KEY_ALIAS"
            rm -f keystore.jks
          else
            echo "No signing key secret set. Signing with ephemeral debug key..."
            keytool -genkey -v -keystore debug.keystore -alias debug \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=Debug, OU=Dev, O=CrunchBarcode, L=City, S=State, C=US"
            jarsigner -verbose -keystore debug.keystore \
              -storepass android -keypass android \
              -digestalg SHA-256 -sigalg SHA256withRSA \
              "$UNSIGNED_APK" debug
            rm -f debug.keystore
          fi

          cp "$UNSIGNED_APK" "$SIGNED_APK"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: crunch-barcode-apk
          path: app/build/outputs/apk/release/*.apk
          compression-level: 0

  release:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: crunch-barcode-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Crunch Barcode App

            Automated build from commit ${{ github.sha }}.

            ### How to install
            1. Download the APK file below
            2. Open it on your Android device
            3. If prompted to scan the app, tap **More Details** → **Install Anyway**
            4. Confirm with your biometrics or device PIN
          files: |
            *.apk
          draft: false
          prerelease: false
